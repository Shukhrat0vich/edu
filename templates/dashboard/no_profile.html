{% extends "base.html" %}
{% block title %}Profile Not Found{% endblock %}

{% block content %}
<div class="empty-state">
  <div class="empty-state-icon">⚠️</div>
  <h3>Profile Not Set Up</h3>
  <p class="text-muted">
    Your {{ role }} profile hasn't been created yet.<br>
    Please contact an administrator to set up your profile.
  </p>
  <a href="{% url 'dashboard:home' %}" class="btn btn-primary mt-3">
    <i class="bi bi-house me-1"></i>Go Home
  </a>
</div>
{% endblock %}
