version: '3.9'

services:
  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: eduanalytics
      POSTGRES_USER: eduuser
      POSTGRES_PASSWORD: edupass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eduuser -d eduanalytics"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Django App ────────────────────────────────────────────────────────────────
  web:
    build: .
    restart: unless-stopped
    environment:
      - DJANGO_SETTINGS_MODULE=edu_analytics.settings.dev
      - SECRET_KEY=dev-secret-key-change-in-prod-please
      - DEBUG=True
      - DB_NAME=eduanalytics
      - DB_USER=eduuser
      - DB_PASSWORD=edupass
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - .:/app
      - media_files:/app/media
      - ml_models:/app/ml_models
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "
        python manage.py migrate --noinput &&
        python manage.py collectstatic --noinput &&
        python manage.py shell < scripts/generate_fake_data.py &&
        python manage.py train_ml_model &&
        gunicorn edu_analytics.wsgi:application --bind 0.0.0.0:8000 --workers 2 --reload
      "

  # ── Nginx ─────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
      - media_files:/var/www/media
      - static_files:/var/www/static
    ports:
      - "80:80"
    depends_on:
      - web

volumes:
  postgres_data:
  media_files:
  static_files:
  ml_models:
